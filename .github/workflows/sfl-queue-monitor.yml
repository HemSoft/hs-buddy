name: SFL Queue Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  actions: read
  issues: write
  discussions: write

concurrency:
  group: sfl-queue-monitor
  cancel-in-progress: false

jobs:
  dequeue:
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue-processor is busy
        id: busy
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          # Check for in-progress or queued runs of the issue-processor
          ACTIVE=$(gh run list \
            --workflow sfl-issue-processor.lock.yml \
            --repo "${{ github.repository }}" \
            --limit 5 \
            --json status \
            --jq '[.[] | select(.status == "in_progress" or .status == "queued" or .status == "waiting")] | length')

          if [ "$ACTIVE" -gt 0 ]; then
            echo "Issue-processor has $ACTIVE active run(s) — pipeline is busy"
            echo "busy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Issue-processor is idle"
            echo "busy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for agent:in-progress issues
        if: steps.busy.outputs.busy == 'false'
        id: inprogress
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          # An open issue with agent:in-progress means the pipeline is mid-work
          COUNT=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "agent:in-progress" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT open issue(s) with agent:in-progress — pipeline is busy"
            echo "busy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No agent:in-progress issues — pipeline is idle"
            echo "busy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find oldest queued issue
        if: steps.busy.outputs.busy == 'false' && steps.inprogress.outputs.busy == 'false'
        id: queue
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          # Get the oldest open issue labeled agent:queue (FIFO by creation date)
          ISSUE_JSON=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "agent:queue" \
            --state open \
            --json number,title,createdAt \
            --jq 'sort_by(.createdAt) | .[0] // empty')

          if [ -z "$ISSUE_JSON" ]; then
            echo "No issues in the queue"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            ISSUE_NUM=$(echo "$ISSUE_JSON" | jq -r '.number')
            ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
            echo "Found queued issue #${ISSUE_NUM}: ${ISSUE_TITLE}"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
            echo "issue_title=${ISSUE_TITLE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch issue-processor
        if: steps.queue.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ steps.queue.outputs.issue_number }}"

          # Swap labels: add agent:fixable (triggers issue-processor via label_command),
          # remove agent:queue (dequeues the issue)
          gh issue edit "$ISSUE_NUM" \
            --repo "${{ github.repository }}" \
            --add-label "agent:fixable" \
            --remove-label "agent:queue"

          echo "Dequeued issue #${ISSUE_NUM}: swapped agent:queue → agent:fixable"

      - name: Log to Discussion #95
        if: always() && steps.queue.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUM: ${{ steps.queue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.queue.outputs.issue_title }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          script: |
            const issueNum = process.env.ISSUE_NUM;
            const issueTitle = process.env.ISSUE_TITLE;
            const body = `📋 **Queue Monitor** | Dequeued issue #${issueNum} (*${issueTitle}*) — swapped agent:queue → agent:fixable`;

            try {
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    discussion(number: $number) { id }
                  }
                }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: 95 }
              );
              await github.graphql(
                `mutation($discussionId: ID!, $body: String!) {
                  addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                    comment { id }
                  }
                }`,
                { discussionId: repository.discussion.id, body }
              );
              console.log('Posted dequeue event to Discussion #95');
            } catch (err) {
              core.warning(`Failed to post to Discussion #95: ${err.message}`);
            }
