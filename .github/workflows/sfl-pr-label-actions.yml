name: SFL PR Label Actions

on:
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: Target PR number for label-based actions
        required: true
  workflow_run:
    workflows: ["SFL Analyzer C — Full-Spectrum Review"]
    types: [completed]

permissions:
  pull-requests: write
  actions: write
  discussions: write
  contents: read
  issues: write

concurrency:
  group: sfl-pr-label-actions-${{ github.event.inputs.pull-request-number || github.run_id }}
  cancel-in-progress: false

jobs:
  label-actions:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'agent-fix/'))
    steps:
      - name: Resolve target PR
        id: find
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ github.event.inputs.pull-request-number }}"
            if [ -z "$PR" ]; then
              echo "::error::pull-request-number input is required but was empty"
              exit 1
            fi
            echo "trigger=dispatch" >> "$GITHUB_OUTPUT"
          else
            # workflow_run trigger: find PR from the branch that Analyzer C ran on
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            echo "Analyzer C completed on branch: ${BRANCH}"
            PR=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
            if [ -z "$PR" ]; then
              echo "No open PR found for branch ${BRANCH} — skipping"
              exit 0
            fi
            echo "trigger=workflow_run" >> "$GITHUB_OUTPUT"
            echo "Resolved PR #${PR} from branch ${BRANCH}"
          fi
          echo "pr_number=${PR}" >> "$GITHUB_OUTPUT"

      - name: Check for duplicate run (workflow_run only)
        if: steps.find.outputs.trigger == 'workflow_run' && steps.find.outputs.pr_number != ''
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          # Analyzer C already dispatches label-actions directly. The
          # workflow_run trigger exists only as a fallback when that dispatch is
          # missing or fails. Skip fallback when the same PR branch already has
          # a recent successful or still-running dispatch-triggered run.
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          RUN_CREATED_AT="${{ github.event.workflow_run.created_at }}"
          WINDOW_START=$(date -u -d "$RUN_CREATED_AT - 10 minutes" +"%Y-%m-%dT%H:%M:%SZ")
          RECENT=$(gh run list \
            --workflow sfl-pr-label-actions.yml \
            --repo ${{ github.repository }} \
            --limit 10 \
            --json databaseId,event,createdAt,status,conclusion,headBranch | jq \
            --arg branch "$BRANCH" \
            --arg window "$WINDOW_START" \
            '[.[] | select(.event == "workflow_dispatch" and .headBranch == $branch and .createdAt >= $window and (.status != "completed" or .conclusion == "success"))] | length')
          if [ "$RECENT" -gt 0 ]; then
            echo "A recent dispatch-triggered label-actions run already handled branch ${BRANCH} — skipping redundant workflow_run fallback"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No recent successful dispatch-triggered run found for branch ${BRANCH} — this workflow_run trigger will proceed as fallback"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check labels and decide action
        if: steps.find.outputs.pr_number != '' && steps.dedup.outputs.skip != 'true'
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          PR_JSON=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft,labels,title)
          TITLE=$(jq -r '.title' <<<"$PR_JSON")
          LABELS=$(jq -r '[.labels[].name] | join("\n")' <<<"$PR_JSON")

          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

          if grep -Fxq "analyzer:blocked" <<<"$LABELS"; then
            echo "action=fix-cycle" >> "$GITHUB_OUTPUT"
          else
            echo "action=ready-for-review" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix cycle — remove blocked label and dispatch issue-processor
        if: steps.decide.outputs.action == 'fix-cycle'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          echo "Analyzer(s) found blocking issues on PR #${PR_NUM}. Starting fix cycle."
          PR_JSON=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft,labels)
          IS_DRAFT=$(jq -r '.isDraft' <<<"$PR_JSON")
          LABELS=$(jq -r '[.labels[].name] | join("\n")' <<<"$PR_JSON")
          gh pr edit "$PR_NUM" --repo ${{ github.repository }} --remove-label "analyzer:blocked"
          if grep -Fxq "human:ready-for-review" <<<"$LABELS"; then
            gh pr edit "$PR_NUM" --repo ${{ github.repository }} --remove-label "human:ready-for-review"
          fi
          if [ "$IS_DRAFT" != "true" ]; then
            gh pr ready "$PR_NUM" --repo ${{ github.repository }} --undo
          fi
          gh workflow run sfl-issue-processor.lock.yml \
            --repo ${{ github.repository }} \
            -f pull-request-number="$PR_NUM"
          echo "Dispatched issue-processor for fix cycle on PR #${PR_NUM}"

      - name: Ready for review — check auto-merge eligibility
        if: steps.decide.outputs.action == 'ready-for-review'
        id: merge-check
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"

          # 1. Read SFL config via GitHub API and decode
          CONFIG_RAW=$(gh api "repos/${{ github.repository }}/contents/.github/sfl-config.yml?ref=main" --jq '.content' 2>&1)
          if [ $? -ne 0 ] || [ -z "$CONFIG_RAW" ]; then
            echo "Could not read sfl-config.yml — falling back to human review"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=config-unreadable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CONFIG=$(echo "$CONFIG_RAW" | base64 -d 2>&1)
          if [ $? -ne 0 ]; then
            echo "Failed to decode sfl-config.yml — falling back to human review"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=decode-failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Parse config with yq (pre-installed on ubuntu-latest)
          # Handles both flat keys (auto-merge:) and nested (autonomy.auto-merge:)
          AUTO_MERGE=$(echo "$CONFIG" | yq '.autonomy.auto-merge // .["auto-merge"] // false')
          if [ "$AUTO_MERGE" != "true" ]; then
            echo "auto-merge is disabled in sfl-config.yml (value: $AUTO_MERGE)"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=disabled" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Read allowed risk levels
          ALLOWED_RISKS=$(echo "$CONFIG" | yq -r '
            (.autonomy.auto-merge-risk-levels // .["auto-merge-risk-levels"] // []) | .[]')
          if [ -z "$ALLOWED_RISKS" ]; then
            echo "No auto-merge-risk-levels configured — falling back to human review"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-risk-levels" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 4. Get PR labels
          PR_LABELS=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json labels --jq '[.labels[].name] | join("\n")')

          # 5. Check if PR has a qualifying risk label
          MATCH="false"
          MATCHED_RISK=""
          while IFS= read -r risk; do
            if echo "$PR_LABELS" | grep -Fxq "$risk"; then
              MATCH="true"
              MATCHED_RISK="$risk"
              break
            fi
          done <<< "$ALLOWED_RISKS"

          if [ "$MATCH" != "true" ]; then
            echo "PR #${PR_NUM} has no qualifying risk label for auto-merge"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=risk-not-eligible" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 6. Verify CI passed (case-insensitive match for any check containing "test")
          CI_STATE=$(gh pr checks "$PR_NUM" --repo ${{ github.repository }} --json name,state \
            --jq '[.[] | select(.name | test("test"; "i"))] | .[0].state // "PENDING"')
          if [ "$CI_STATE" != "SUCCESS" ]; then
            echo "CI check is $CI_STATE (not SUCCESS) — falling back to human review"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=ci-not-green" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR #${PR_NUM} qualifies for auto-merge (risk: ${MATCHED_RISK}, CI: green)"
          echo "auto_merge=true" >> "$GITHUB_OUTPUT"
          echo "matched_risk=${MATCHED_RISK}" >> "$GITHUB_OUTPUT"

      - name: Auto-merge — squash merge and clean up
        if: steps.decide.outputs.action == 'ready-for-review' && steps.merge-check.outputs.auto_merge == 'true'
        id: auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          RISK="${{ steps.merge-check.outputs.matched_risk }}"

          # Pre-merge CI recheck (guard against race condition)
          CI_NOW=$(gh pr checks "$PR_NUM" --repo ${{ github.repository }} --json name,state \
            --jq '[.[] | select(.name | test("test"; "i"))] | .[0].state // "PENDING"')
          if [ "$CI_NOW" != "SUCCESS" ]; then
            echo "CI is now $CI_NOW — aborting auto-merge, falling back to human review"
            if ! gh pr edit "$PR_NUM" --repo ${{ github.repository }} --add-label "human:ready-for-review"; then
              echo "ERROR: Could not add fallback label to PR #${PR_NUM}" >&2
            fi
            echo "merge_result=ci-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Flip to ready if still draft
          IS_DRAFT=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUM" --repo ${{ github.repository }}
          fi

          # Attempt squash merge with branch cleanup (--admin bypasses branch protection)
          if gh pr merge "$PR_NUM" --repo ${{ github.repository }} --squash --delete-branch --admin; then
            echo "merge_result=success" >> "$GITHUB_OUTPUT"
            echo "Successfully auto-merged PR #${PR_NUM} (${RISK})"

            # Close linked issue label cleanup
            PR_BODY=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json body --jq '.body // ""')
            LINKED_ISSUE=$(echo "$PR_BODY" | grep -oE 'Closes #[0-9]+' | head -1 | sed 's/Closes #//')
            if [ -n "$LINKED_ISSUE" ]; then
              if ! gh issue edit "$LINKED_ISSUE" --repo ${{ github.repository }} --remove-label "agent:in-progress" 2>&1; then
                echo "Warning: failed to clean up labels on issue #${LINKED_ISSUE}"
              else
                echo "Cleaned up labels on issue #${LINKED_ISSUE}"
              fi
            fi
          else
            echo "merge_result=failed" >> "$GITHUB_OUTPUT"
            echo "Auto-merge failed for PR #${PR_NUM} — falling back to human review"
            if ! gh pr edit "$PR_NUM" --repo ${{ github.repository }} --add-label "human:ready-for-review"; then
              echo "ERROR: Could not add fallback label to PR #${PR_NUM}" >&2
            fi
          fi

      - name: Ready for review — add label and flip draft (human review path)
        if: steps.decide.outputs.action == 'ready-for-review' && steps.merge-check.outputs.auto_merge != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          IS_DRAFT=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft --jq '.isDraft')
          gh pr edit "$PR_NUM" --repo ${{ github.repository }} --add-label "human:ready-for-review"
          if [ "$IS_DRAFT" = "true" ]; then
            echo "All analyzers passed. Flipping PR #${PR_NUM} to ready-for-review."
            gh pr ready "$PR_NUM" --repo ${{ github.repository }}
          else
            echo "PR #${PR_NUM} is already ready for review."
          fi

      - name: Log decision to Discussion #95
        if: always() && steps.find.outputs.pr_number != '' && steps.dedup.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ steps.find.outputs.pr_number }}
          ACTION: ${{ steps.decide.outputs.action }}
          PR_TITLE: ${{ steps.decide.outputs.title }}
          TRIGGER: ${{ steps.find.outputs.trigger }}
          AUTO_MERGE: ${{ steps.merge-check.outputs.auto_merge }}
          MERGE_REASON: ${{ steps.merge-check.outputs.reason }}
          MERGE_RESULT: ${{ steps.auto-merge.outputs.merge_result }}
          MATCHED_RISK: ${{ steps.merge-check.outputs.matched_risk }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          script: |
            const prNum = process.env.PR_NUM;
            const action = process.env.ACTION;
            const title = process.env.PR_TITLE;
            const trigger = process.env.TRIGGER;
            const autoMerge = process.env.AUTO_MERGE;
            const mergeReason = process.env.MERGE_REASON;
            const mergeResult = process.env.MERGE_RESULT;
            const matchedRisk = process.env.MATCHED_RISK;
            const fallbackTag = trigger === 'workflow_run' ? ' *(deterministic fallback)*' : '';

            let body;
            if (action === 'fix-cycle') {
              body = `🔄 **Label Actions → Fix Cycle** | PR #${prNum} (*${title}*) — \`analyzer:blocked\` detected, dispatched issue-processor for fix cycle${fallbackTag}`;
            } else if (action === 'ready-for-review' && autoMerge === 'true' && mergeResult === 'success') {
              body = `🚀 **Label Actions → Auto-Merged** | PR #${prNum} (*${title}*) — all analyzers passed, CI green, \`${matchedRisk}\` — squash-merged automatically${fallbackTag}`;
            } else if (action === 'ready-for-review' && autoMerge === 'true' && mergeResult === 'ci-changed') {
              body = `⚠️ **Label Actions → Merge Blocked** | PR #${prNum} (*${title}*) — CI state changed during merge window, marked for human review${fallbackTag}`;
            } else if (action === 'ready-for-review' && autoMerge === 'true') {
              body = `❌ **Label Actions → Merge Failed** | PR #${prNum} (*${title}*) — auto-merge attempt failed (${mergeResult || 'unknown'}), marked for human review${fallbackTag}`;
            } else if (action === 'ready-for-review') {
              const reason = mergeReason ? ` (${mergeReason})` : '';
              body = `✅ **Label Actions → Ready for Review** | PR #${prNum} (*${title}*) — all analyzers passed, marked ready for human review${reason}${fallbackTag}`;
            } else {
              body = `ℹ️ **Label Actions** | PR #${prNum} — no actionable state detected`;
            }

            try {
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    discussion(number: $number) { id }
                  }
                }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: 95 }
              );
              await github.graphql(
                `mutation($discussionId: ID!, $body: String!) {
                  addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                    comment { id }
                  }
                }`,
                { discussionId: repository.discussion.id, body }
              );
              console.log('Posted decision to Discussion #95');
            } catch (err) {
              core.warning(`Failed to post to Discussion #95: ${err.message}`);
            }