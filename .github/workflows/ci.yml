name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Check for unused code and dependencies
        run: bun run knip

      - name: Format check (Prettier)
        run: bun run format:check

      - name: Analyze dependency health
        run: npx --yes @e18e/cli analyze
        continue-on-error: true

      - name: Check architecture boundaries (dependency-cruiser)
        run: |
          # depcruise exits non-zero for any violations including warnings.
          # --ignore-known excludes pre-existing violations baselined in .dependency-cruiser-known-violations.json.
          # Only fail CI on error-level violations to support gradual rollout.
          bunx depcruise src electron convex --config .dependency-cruiser.cjs --ignore-known -T json > /tmp/dc-output.json || true
          node -e "
            const r = require('/tmp/dc-output.json');
            const e = r.summary?.error || 0;
            const w = r.summary?.warn || 0;
            console.log('Architecture boundaries: ' + e + ' errors, ' + w + ' warnings');
            if (e > 0) { console.error('Error-level boundary violations found'); process.exit(1); }
            console.log('No error-level boundary violations');
          "

      - name: Quality gate lint (informational)
        run: bun run lint:quality
        continue-on-error: true

      - name: Electron security check
        run: bun scripts/check-electron-security.ts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (TypeScript + Convex)
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Report coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            {
              echo "## Test Coverage"
              echo ""
              echo "| Category | Covered |"
              echo "|----------|---------|"
            } >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const data = require('./coverage/coverage-summary.json');
              const t = data.total;
              ['statements','branches','functions','lines'].forEach(k => {
                const pct = t[k].pct.toFixed(1);
                const line = '| ' + k.charAt(0).toUpperCase() + k.slice(1) + ' | ' + pct + '% |';
                require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, line + '\n');
              });
            "
          fi

      - name: Prepare coverage artifacts for scorecard
        if: always()
        run: |
          mkdir -p coverage-upload
          if [ -f coverage/cobertura-coverage.xml ]; then
            grep -v '<!DOCTYPE' coverage/cobertura-coverage.xml > coverage-upload/cobertura-coverage.xml || true
            if [ ! -s coverage-upload/cobertura-coverage.xml ]; then
              echo "::warning::Failed to create cleaned Cobertura XML (file missing or empty)"
              rm -f coverage-upload/cobertura-coverage.xml
            elif grep -q '<!DOCTYPE' coverage-upload/cobertura-coverage.xml; then
              echo "::warning::DOCTYPE still present — removing Cobertura XML to prevent parser hangs"
              rm -f coverage-upload/cobertura-coverage.xml
            else
              echo "✓ DOCTYPE stripped from Cobertura XML"
            fi
          fi
          [ -f coverage/coverage-summary.json ] && cp coverage/coverage-summary.json coverage-upload/
          [ -f coverage/lcov.info ] && cp coverage/lcov.info coverage-upload/
          ls -la coverage-upload/ 2>/dev/null || echo "::warning::No coverage files to upload"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cobertura-coverage
          path: coverage-upload/*
          if-no-files-found: warn
          retention-days: 30

  test-electron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run electron tests with coverage
        run: bun run test:electron:coverage

  test-ipc-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run IPC contract tests
        run: bun run test:ipc-contracts

  test-convex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Convex server function tests
        run: bun run test:convex

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Chrome is available for E2E
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            google-chrome --version
          else
            npx playwright install chrome
          fi

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true
          VITE_CONVEX_URL: https://placeholder-e2e.convex.cloud

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-test-results
          path: |
            e2e-results.xml
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (vite + electron)
        run: npx vite build

      - name: Check bundle sizes
        run: bun run bundle-size

  lighthouse:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Lighthouse CI
        run: bun run lhci
        env:
          VITE_CONVEX_URL: https://placeholder-lhci.convex.cloud
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Report Lighthouse scores
        if: always()
        run: |
          if [ -d .lighthouseci ]; then
            echo "## Lighthouse CI Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for f in .lighthouseci/lhr-*.json; do
              [ -f "$f" ] || continue
              node -e "
                const lhr = require('./' + '$f');
                const cats = lhr.categories;
                console.log('| Category | Score |');
                console.log('|----------|-------|');
                Object.values(cats).forEach(c => {
                  console.log('| ' + c.title + ' | ' + Math.round(c.score * 100) + ' |');
                });
              " >> "$GITHUB_STEP_SUMMARY"
              break
            done
          fi

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-results
          path: .lighthouseci/
          if-no-files-found: warn
          retention-days: 30

  ci-complete:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, test-electron, test-ipc-contracts, test-convex, test-e2e, build]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.test-electron.result }}" != "success" ] || \
             [ "${{ needs.test-ipc-contracts.result }}" != "success" ] || \
             [ "${{ needs.test-convex.result }}" != "success" ] || \
             [ "${{ needs.test-e2e.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            echo "lint: ${{ needs.lint.result }}"
            echo "typecheck: ${{ needs.typecheck.result }}"
            echo "test: ${{ needs.test.result }}"
            echo "test-electron: ${{ needs.test-electron.result }}"
            echo "test-ipc-contracts: ${{ needs.test-ipc-contracts.result }}"
            echo "test-convex: ${{ needs.test-convex.result }}"
            echo "test-e2e: ${{ needs.test-e2e.result }}"
            echo "build: ${{ needs.build.result }}"
            exit 1
          fi
          echo "✓ All CI jobs passed"
