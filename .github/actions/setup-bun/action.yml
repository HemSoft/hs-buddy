name: Setup Bun
description: Install the repository-pinned Bun toolchain.

inputs:
  bun-version:
    description: Bun version to install.
    required: false
    default: 1.3.7

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}
