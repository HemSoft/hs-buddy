name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-benchmarks') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-benchmarks'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install Bun
        run: npm install -g bun@1.2.0

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore baseline from main branch cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: bench-baseline.json
          key: bench-baseline-main-${{ github.event.pull_request.base.sha || github.sha }}
          restore-keys: bench-baseline-main-

      - name: Run benchmarks (JSON output)
        run: bun run bench:json

      - name: Compare against baseline
        if: hashFiles('bench-baseline.json') != ''
        run: bun run bench:compare

      - name: Update baseline from results (main branch only)
        if: github.ref == 'refs/heads/main' && success()
        run: cp bench-results.json bench-baseline.json

      - name: Save baseline to cache (main branch only)
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: bench-baseline.json
          key: bench-baseline-main-${{ github.sha }}

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-results
          path: bench-results.json
          if-no-files-found: warn
          retention-days: 30
