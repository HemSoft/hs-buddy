name: SFL PR Label Actions

on:
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: Target draft PR number to flip ready-for-review
        required: false

permissions:
  pull-requests: write

concurrency:
  group: sfl-pr-label-actions-${{ github.event.inputs.pull-request-number || github.run_id }}
  cancel-in-progress: false

jobs:
  ready-for-review:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target PR
        id: find
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.inputs.pull-request-number }}"
          if [ -z "$PR" ]; then
            PR=$(gh pr list --repo ${{ github.repository }} --state open --draft --label "human:ready-for-review" --json number --jq '.[0].number // empty')
          fi
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
      - name: Mark PR as ready for review
        if: steps.find.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          PR_JSON=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft,labels)
          IS_DRAFT=$(jq -r '.isDraft' <<<"$PR_JSON")
          LABELS=$(jq -r '[.labels[].name] | join("\n")' <<<"$PR_JSON")

          if [ "$IS_DRAFT" != "true" ]; then
            echo "PR #${PR_NUM} is already ready for review."
            exit 0
          fi

          if ! grep -Fxq "human:ready-for-review" <<<"$LABELS"; then
            echo "PR #${PR_NUM} does not have human:ready-for-review."
            exit 0
          fi

          echo "Flipping PR #${PR_NUM} from draft to ready-for-review"
          gh pr ready "${PR_NUM}" --repo ${{ github.repository }}
          echo "Done - PR is now ready for review"