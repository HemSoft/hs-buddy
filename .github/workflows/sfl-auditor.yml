# SFL Auditor — standard workflow (replaces gh-aw sfl-auditor.lock.yml)
#
# Runs every 30 minutes. Audits the relationship between issue labels and open
# pull requests. Detects and repairs state discrepancies to keep the agentic
# pipeline self-consistent. Never modifies PR content — only updates issues.

name: "SFL Auditor"

on:
  schedule:
    - cron: "15,45 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: "gh-aw-SFL Auditor"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Verify authentication
        run: |
          set -euo pipefail
          if ! gh auth status 2>&1; then
            echo "::error::GH_AW_GITHUB_TOKEN is not valid"
            exit 1
          fi

      - name: Gather current state
        id: gather
        run: |
          set -euo pipefail

          # A. In-progress issues
          gh issue list --repo "$REPO" --state open --label "agent:in-progress" \
            --json number,labels,title --limit 100 > /tmp/in_progress_issues.json

          IP_COUNT=$(jq 'length' /tmp/in_progress_issues.json)
          echo "Found $IP_COUNT in-progress issues"

          # B. Open agent PRs (branch pattern: agent-fix/issue-<number>-*)
          gh pr list --repo "$REPO" --state open \
            --json number,headRefName,labels,title --limit 100 > /tmp/all_prs.json

          # Filter to agent-fix/ branches and extract issue numbers
          jq '[.[] | select(.headRefName | startswith("agent-fix/issue-")) |
            . + {linkedIssue: (.headRefName | capture("agent-fix/issue-(?<num>[0-9]+)-") | .num | tonumber)}]' \
            /tmp/all_prs.json > /tmp/agent_prs.json

          PR_COUNT=$(jq 'length' /tmp/agent_prs.json)
          echo "Found $PR_COUNT open agent PRs"

          echo "discrepancies=0" >> "$GITHUB_OUTPUT"

      - name: "Check: orphaned agent:in-progress labels"
        id: orphaned-labels
        run: |
          set -euo pipefail

          FIXED=0

          # For each in-progress issue, check if a matching agent PR exists
          for ISSUE_NUM in $(jq -r '.[].number' /tmp/in_progress_issues.json); do
            HAS_PR=$(jq --argjson n "$ISSUE_NUM" '[.[] | select(.linkedIssue == $n)] | length' /tmp/agent_prs.json)

            if [ "$HAS_PR" -eq 0 ]; then
              echo "Issue #$ISSUE_NUM has agent:in-progress but no matching open PR — resetting to agent:fixable"

              # Get current labels, remove agent:in-progress, add agent:fixable
              CURRENT_LABELS=$(jq -r --argjson n "$ISSUE_NUM" '.[] | select(.number == $n) | .labels | map(.name) | join(",")' /tmp/in_progress_issues.json)

              NEW_LABELS=$(echo "$CURRENT_LABELS" | tr ',' '\n' | grep -v '^agent:in-progress$' | tr '\n' ',' | sed 's/,$//')
              NEW_LABELS="${NEW_LABELS:+$NEW_LABELS,}agent:fixable"

              # Post comment and update labels in a sequence (gh CLI doesn't support both at once)
              gh issue comment "$ISSUE_NUM" --repo "$REPO" \
                --body "⚠️ **SFL Auditor**: No open PR found for this issue. Resetting to \`agent:fixable\` so the issue processor can reclaim it on the next run."

              # Remove old label, add new one
              gh issue edit "$ISSUE_NUM" --repo "$REPO" --remove-label "agent:in-progress" 2>/dev/null || true
              gh issue edit "$ISSUE_NUM" --repo "$REPO" --add-label "agent:fixable"

              FIXED=$((FIXED + 1))

              # Track this issue to skip in step 4
              echo "$ISSUE_NUM" >> /tmp/fixed_issues.txt
            fi
          done

          touch /tmp/fixed_issues.txt
          echo "orphaned_labels_fixed=$FIXED" >> "$GITHUB_OUTPUT"
          echo "Fixed $FIXED orphaned agent:in-progress labels"

      - name: "Check: conflicting labels"
        id: conflicting
        run: |
          set -euo pipefail

          FIXED=0

          # Find issues with BOTH agent:in-progress AND agent:fixable
          ISSUES_WITH_BOTH=$(gh issue list --repo "$REPO" --state open \
            --label "agent:in-progress" --label "agent:fixable" \
            --json number --jq '.[].number')

          for ISSUE_NUM in $ISSUES_WITH_BOTH; do
            echo "Issue #$ISSUE_NUM has both agent:in-progress and agent:fixable — removing agent:fixable"

            gh issue edit "$ISSUE_NUM" --repo "$REPO" --remove-label "agent:fixable"
            FIXED=$((FIXED + 1))
          done

          echo "conflicting_fixed=$FIXED" >> "$GITHUB_OUTPUT"
          echo "Fixed $FIXED conflicting label issues"

      - name: "Check: orphaned agent PRs"
        id: orphaned-prs
        run: |
          set -euo pipefail

          FOUND=0

          while IFS= read -r ROW; do
            PR_NUM=$(echo "$ROW" | jq '.number')
            LINKED_ISSUE=$(echo "$ROW" | jq '.linkedIssue')
            BRANCH=$(echo "$ROW" | jq -r '.headRefName')

            # Skip if this issue was already fixed in the orphaned labels step
            if grep -qxF "$LINKED_ISSUE" /tmp/fixed_issues.txt 2>/dev/null; then
              echo "Skipping PR #$PR_NUM — linked issue #$LINKED_ISSUE was already processed"
              continue
            fi

            # Check if the linked issue has agent:in-progress
            HAS_LABEL=$(jq --argjson n "$LINKED_ISSUE" '[.[] | select(.number == $n)] | length' /tmp/in_progress_issues.json)

            if [ "$HAS_LABEL" -eq 0 ]; then
              echo "PR #$PR_NUM on branch $BRANCH — linked issue #$LINKED_ISSUE lacks agent:in-progress"

              gh issue comment "$LINKED_ISSUE" --repo "$REPO" \
                --body "ℹ️ **SFL Auditor**: PR #$PR_NUM exists on branch \`$BRANCH\` but this issue is no longer labeled \`agent:in-progress\`. A human should decide whether to close the PR or restore the label."

              FOUND=$((FOUND + 1))
            fi
          done < <(jq -c '.[]' /tmp/agent_prs.json)

          echo "orphaned_prs_found=$FOUND" >> "$GITHUB_OUTPUT"
          echo "Found $FOUND orphaned agent PRs"

      - name: "Check: unexplained agent:pause"
        id: paused
        run: |
          set -euo pipefail

          FOUND=0

          PAUSED_ISSUES=$(gh issue list --repo "$REPO" --state open --label "agent:pause" \
            --json number --jq '.[].number')

          for ISSUE_NUM in $PAUSED_ISSUES; do
            # Check if any comment mentions pause
            HAS_EXPLANATION=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json comments \
              --jq '.comments[].body' | grep -ciP 'pause[d]?|agent:pause' || echo 0)

            if [ "$HAS_EXPLANATION" -eq 0 ]; then
              echo "Issue #$ISSUE_NUM has agent:pause but no explanation comment"

              gh issue comment "$ISSUE_NUM" --repo "$REPO" \
                --body "🔍 **SFL Auditor**: This issue has \`agent:pause\` but no explanation comment was found. A human should add a comment explaining the pause, or remove the label to resume processing."

              FOUND=$((FOUND + 1))
            fi
          done

          echo "unexplained_pause_found=$FOUND" >> "$GITHUB_OUTPUT"
          echo "Found $FOUND unexplained pauses"

      - name: Summary
        run: |
          ORPHANED_LABELS="${{ steps.orphaned-labels.outputs.orphaned_labels_fixed }}"
          CONFLICTING="${{ steps.conflicting.outputs.conflicting_fixed }}"
          ORPHANED_PRS="${{ steps.orphaned-prs.outputs.orphaned_prs_found }}"
          PAUSED="${{ steps.paused.outputs.unexplained_pause_found }}"

          TOTAL=$((ORPHANED_LABELS + CONFLICTING + ORPHANED_PRS + PAUSED))

          echo "## SFL Auditor Summary"
          echo ""
          echo "| Check | Count |"
          echo "|-------|-------|"
          echo "| Orphaned in-progress labels fixed | $ORPHANED_LABELS |"
          echo "| Conflicting labels fixed | $CONFLICTING |"
          echo "| Orphaned agent PRs flagged | $ORPHANED_PRS |"
          echo "| Unexplained pauses flagged | $PAUSED |"
          echo ""

          if [ "$TOTAL" -eq 0 ]; then
            echo "All checks passed — no discrepancies found."
          else
            echo "Found and addressed $TOTAL discrepancies."
          fi
