name: SFL Gate

# Lightweight orchestrator: validates entry, dispatches workers, collects verdicts.
# No LLM — pure shell logic.
# Uses GH_AW_GITHUB_TOKEN (PAT) instead of GITHUB_TOKEN so that dispatched
# workflows emit workflow_run events back to this gate.

on:
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue-number:
        description: Target issue number for implementation
        required: false
      pull-request-number:
        description: Target PR number for follow-up implementation
        required: false
  workflow_run:
    workflows:
      - "SFL Implementer"
      - "SFL Analyzer A — Full-Spectrum Review"
      - "SFL Analyzer B — Full-Spectrum Review"
      - "SFL Analyzer C — Full-Spectrum Review"
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Entry Gate: validate issue labels and dispatch implementer
  # ─────────────────────────────────────────────────────────────────
  entry-gate:
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: sfl-entry-${{ github.event.issue.number || github.event.inputs.issue-number || github.event.inputs.pull-request-number || github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Validate and dispatch implementer
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Motherrepo guard: disable automatic triggers in template repo
          MOTHERREPO="relias-engineering/set-it-free-loop"
          if [ "${{ github.repository }}" = "${MOTHERREPO}" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Motherrepo — automatic triggers disabled"
            exit 0
          fi

          # workflow_dispatch: require at least one input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE="${{ github.event.inputs.issue-number }}"
            PR="${{ github.event.inputs.pull-request-number }}"

            if [ -z "$ISSUE" ] && [ -z "$PR" ]; then
              echo "workflow_dispatch requires issue-number or pull-request-number"
              exit 0
            fi

            if [ -n "$PR" ]; then
              echo "Dispatching implementer for PR #${PR}"
              gh workflow run sfl-implement.lock.yml \
                --repo "${{ github.repository }}" \
                -f pull-request-number="${PR}"
            else
              echo "Dispatching implementer for issue #${ISSUE}"
              gh workflow run sfl-implement.lock.yml \
                --repo "${{ github.repository }}" \
                -f issue-number="${ISSUE}"
            fi
            exit 0
          fi

          # issues event: only agent:fixable triggers implementation
          ISSUE_NUM="${{ github.event.issue.number }}"

          if [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" != "agent:fixable" ]; then
            echo "Label '${{ github.event.label.name }}' — not agent:fixable, skipping"
            exit 0
          fi

          LABELS=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels" \
            --jq '.[].name' 2>/dev/null || echo "")

          for SKIP_LABEL in no-agent agent:blocked agent:in-progress report; do
            if echo "$LABELS" | grep -Fxq "$SKIP_LABEL"; then
              echo "Issue #${ISSUE_NUM} has ${SKIP_LABEL} — skipping"
              exit 0
            fi
          done

          if ! echo "$LABELS" | grep -Fxq "agent:fixable"; then
            echo "Issue #${ISSUE_NUM} missing agent:fixable — skipping"
            exit 0
          fi

          echo "Issue #${ISSUE_NUM} is actionable — dispatching implementer"
          gh api --method POST \
            "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels" \
            -f "labels[]=agent:in-progress" --silent || true
          gh workflow run sfl-implement.lock.yml \
            --repo "${{ github.repository }}" \
            -f issue-number="${ISSUE_NUM}"

  # ─────────────────────────────────────────────────────────────────
  # Implement Complete: dispatch analyzers after successful implementation
  # ─────────────────────────────────────────────────────────────────
  implement-complete:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'SFL Implementer' &&
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: sfl-implement-complete
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR and dispatch analyzers
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          echo "Implementer run #${RUN_ID} succeeded — resolving PR number"

          # Try to get inputs from the implement run (may be null for gh-aw runs)
          INPUTS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.inputs // {}')

          PR_NUM=$(echo "$INPUTS" | jq -r '.["pull-request-number"] // empty')
          ISSUE_NUM=$(echo "$INPUTS" | jq -r '.["issue-number"] // empty')

          # If PR number was provided as input, use it directly
          if [ -n "$PR_NUM" ]; then
            echo "PR #${PR_NUM} from dispatch input"
          fi

          # Otherwise, find the PR by issue number
          if [ -z "$PR_NUM" ] && [ -n "$ISSUE_NUM" ]; then
            echo "Looking for agent:pr PR linked to issue #${ISSUE_NUM}..."
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" \
              --state open --label "agent:pr" --limit 200 \
              --json number,body \
              --jq ".[] | select((.body // \"\") | test(\"(?i)(closes|fixes|resolves)\\\\s+#${ISSUE_NUM}\\\\b\")) | .number" \
              | head -1)
          fi

          # Fallback: gh-aw runs expose null inputs — find the most recent
          # open draft PR with agent:pr label on an agent-fix/ branch
          if [ -z "$PR_NUM" ]; then
            echo "Inputs unavailable — falling back to most recent agent:pr draft PR"
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" \
              --state open --label "agent:pr" --limit 10 \
              --json number,isDraft,headRefName,createdAt \
              --jq '[.[] | select(.isDraft == true and (.headRefName | startswith("agent-fix/")))] | sort_by(.createdAt) | last | .number // empty')
          fi

          if [ -z "$PR_NUM" ]; then
            echo "Could not resolve PR number — cannot dispatch analyzers"
            exit 0
          fi

          # If PR is no longer draft, it's in the Copilot review cycle —
          # check for unresolved Copilot threads, resolve them if addressed,
          # then re-request Copilot review.
          IS_DRAFT=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json isDraft --jq '.isDraft')

          if [ "$IS_DRAFT" != "true" ]; then
            echo "PR #${PR_NUM} is not draft — Copilot review cycle, skipping analyzers"

            # ── Unresolved Copilot thread gate ──
            REPO_OWNER="${{ github.repository_owner }}"
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)

            THREADS_JSON=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      pageInfo { hasNextPage }
                      nodes {
                        id
                        isResolved
                        isOutdated
                        comments(first: 10) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }' -f owner="$REPO_OWNER" -f repo="$REPO_NAME" -F pr="$PR_NUM" \
              --jq '.data.repository.pullRequest.reviewThreads')

            HAS_NEXT=$(printf '%s' "$THREADS_JSON" | jq -r '.pageInfo.hasNextPage')
            if [ "$HAS_NEXT" = "true" ]; then
              echo "Warning: PR has >100 review threads — only first 100 checked"
            fi

            # Filter to unresolved, non-outdated, Copilot-authored threads
            COPILOT_RE='copilot-pull-request-reviewer|copilot|Copilot'

            UNRESOLVED_THREADS=$(printf '%s' "$THREADS_JSON" | jq --arg re "$COPILOT_RE" '
              [.nodes[] | select(
                .isResolved == false and
                .isOutdated == false and
                (.comments.nodes[0].author.login | test($re; "i"))
              )]')

            UNRESOLVED_COUNT=$(printf '%s' "$UNRESOLVED_THREADS" | jq 'length')
            echo "Unresolved Copilot review threads: ${UNRESOLVED_COUNT}"

            if [ "${UNRESOLVED_COUNT}" -gt 0 ]; then
              # Check which threads have an implementer reply (>1 comment = replied)
              UNREPLIED=$(printf '%s' "$UNRESOLVED_THREADS" | jq '
                [.[] | select(.comments.nodes | length <= 1)] | length')

              if [ "${UNREPLIED}" -gt 0 ]; then
                # Implementer didn't reply — redispatch once per Copilot cycle
                COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
                  --paginate --jq '[.[] | {body, created_at}]')

                LAST_DISPATCH=$(printf '%s' "$COMMENTS_JSON" | jq -r '
                  [.[] | select(.body | contains("MARKER:sfl-copilot-dispatch")) | .created_at]
                  | sort | last // "1970-01-01T00:00:00Z"')

                RETRY_COUNT=$(printf '%s' "$COMMENTS_JSON" | jq -r --arg fence "$LAST_DISPATCH" '
                  [.[] | select(
                    (.created_at > $fence) and
                    (.body | contains("MARKER:sfl-unresolved-retry"))
                  )] | length')

                if [ "${RETRY_COUNT}" -lt 1 ]; then
                  echo "${UNREPLIED} Copilot thread(s) have no implementer reply — dispatching to address"
                  gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
                    --field body="<!-- MARKER:sfl-unresolved-retry -->
            ⚠️ ${UNREPLIED} unresolved Copilot review thread(s) with no reply — dispatching implementer to address and resolve." > /dev/null
                  gh workflow run sfl-implement.lock.yml \
                    --repo "${{ github.repository }}" \
                    -f pull-request-number="${PR_NUM}"
                  exit 0
                fi
                echo "Retry budget exhausted — resolving unreplied threads deterministically"
              fi

              # Resolve all unresolved Copilot threads deterministically
              echo "Resolving ${UNRESOLVED_COUNT} Copilot review thread(s) via GraphQL"
              printf '%s' "$UNRESOLVED_THREADS" | jq -r '.[].id' | while read -r THREAD_ID; do
                gh api graphql -f query='
                  mutation($threadId: ID!) {
                    resolveReviewThread(input: {threadId: $threadId}) {
                      thread { isResolved }
                    }
                  }' -f threadId="$THREAD_ID" > /dev/null 2>&1 || {
                  echo "Warning: failed to resolve thread ${THREAD_ID}"
                }
              done
            fi

            echo "Re-requesting Copilot code review for PR #${PR_NUM}"
            gh pr edit "$PR_NUM" --repo "${{ github.repository }}" \
              --add-reviewer "@copilot" || {
              echo "Warning: failed to re-request Copilot review (non-fatal)"
            }
            exit 0
          fi

          echo "Dispatching 3 analyzers for PR #${PR_NUM}"

          # Remove analyzer:blocked from previous cycle — each cycle starts clean.
          # If any analyzer in this cycle finds blocking issues, it re-adds the label.
          LABELS=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join("\n")')
          if echo "$LABELS" | grep -Fxq "analyzer:blocked"; then
            gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --remove-label "analyzer:blocked"
          fi

          for ANALYZER in sfl-analyzer-a sfl-analyzer-b sfl-analyzer-c; do
            echo "  → ${ANALYZER}"
            gh workflow run "${ANALYZER}.lock.yml" \
              --repo "${{ github.repository }}" \
              -f pull-request-number="${PR_NUM}"
            sleep 2  # Respect rate limits
          done

  # ─────────────────────────────────────────────────────────────────
  # Verdict Gate: collect analyzer verdicts and route
  # ─────────────────────────────────────────────────────────────────
  # Verdict Gate: collect analyzer results and route
  #
  # Uses deterministic signals only — no LLM text parsing:
  #   - PR resolution: 3-tier fallback (inputs → issue search → draft PR)
  #   - Completion: count gh-aw metadata footers since last implementer comment
  #   - Verdict: analyzer:blocked label (set by analyzers via safe-output)
  #   - Cycle count: number of implementer comments (workflow_id: sfl-implement)
  # ─────────────────────────────────────────────────────────────────
  verdict-gate:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name != 'SFL Implementer'
    concurrency:
      group: sfl-verdict-gate
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Collect verdicts and route
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail

          echo "Analyzer '${RUN_NAME}' run #${RUN_ID} completed: ${RUN_CONCLUSION}"

          # ── 1. Resolve PR number (3-tier fallback) ──
          PR_NUM=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '.inputs["pull-request-number"] // empty' 2>/dev/null || true)

          if [ -z "$PR_NUM" ]; then
            echo "Inputs unavailable — falling back to most recent agent:pr draft PR"
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" \
              --state open --label "agent:pr" --limit 10 \
              --json number,isDraft,headRefName,createdAt \
              --jq '[.[] | select(.isDraft == true and (.headRefName | startswith("agent-fix/")))] | sort_by(.createdAt) | last | .number // empty')
          fi

          if [ -z "$PR_NUM" ]; then
            echo "Could not resolve PR number — skipping"
            exit 0
          fi

          echo "PR #${PR_NUM}"

          # ── 1b. Handle failed analyzer runs ──
          # If the analyzer workflow crashed/timed-out before posting a comment,
          # the gate would wait forever for 3 comments that never arrive.
          # Fix: post a synthetic comment with the expected workflow_id tag so the
          # counting logic picks it up, and add analyzer:blocked.
          if [ "${RUN_CONCLUSION}" != "success" ]; then
            case "${RUN_NAME}" in
              *"Analyzer A"*) FAILED_ID="a" ;;
              *"Analyzer B"*) FAILED_ID="b" ;;
              *"Analyzer C"*) FAILED_ID="c" ;;
              *) FAILED_ID="" ;;
            esac

            if [ -n "$FAILED_ID" ]; then
              echo "Analyzer ${FAILED_ID} failed (${RUN_CONCLUSION}) — posting synthetic failure comment"
              gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
                --field body="## Analyzer ${FAILED_ID} — Workflow Failure

          Analyzer workflow failed with conclusion: \`${RUN_CONCLUSION}\`.

          <!-- gate-synthetic workflow_id: sfl-analyzer-${FAILED_ID} -->" > /dev/null

              gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "analyzer:blocked" 2>/dev/null || true
            fi
          fi

          # ── 2. Timestamp fence: find last implementer comment ──
          # gh-aw comments contain "workflow_id: sfl-implement" in their footer.
          # Only count analyzer comments posted AFTER the most recent implementer
          # comment — this naturally scopes to the current fix cycle.
          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --paginate --jq '[.[] | {body, created_at}]')

          FENCE=$(printf '%s\n' "$COMMENTS_JSON" | jq -r '
            [.[] | select(.body | test("workflow_id:\\s*sfl-implement")) | .created_at]
            | sort | last // "1970-01-01T00:00:00Z"')
          echo "Implementer fence: ${FENCE}"

          # ── 3. Count completed analyzer comments since fence ──
          # Each analyzer posts exactly one comment with a gh-aw footer
          # containing "workflow_id: sfl-analyzer-{a,b,c}".
          for ID in a b c; do
            COUNT=$(printf '%s\n' "$COMMENTS_JSON" | jq -r --arg id "$ID" --arg fence "$FENCE" '
              [.[] | select(
                (.created_at > $fence) and
                (.body | test("workflow_id:\\s*sfl-analyzer-" + $id))
              )] | length')
            eval "DONE_${ID}=${COUNT}"
            echo "Analyzer ${ID}: ${COUNT} comment(s) since fence"
          done

          TOTAL=$((DONE_a + DONE_b + DONE_c))

          if [ "$TOTAL" -lt 3 ]; then
            echo "Only ${TOTAL}/3 analyzer comments — waiting for remaining"
            exit 0
          fi

          echo "All 3 analyzers have reported"

          # ── 4. Route based on analyzer:blocked label ──
          # The label is the single source of truth for blocking status.
          # Analyzers add it via safe-output when they find blocking issues.
          LABELS=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join("\n")')

          if echo "$LABELS" | grep -Fxq "analyzer:blocked"; then
            echo "Route: BLOCKED"

            if echo "$LABELS" | grep -Fxq "human:ready-for-review"; then
              gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --remove-label "human:ready-for-review"
            fi

            # Count cycles = number of implementer comments on this PR
            CYCLE=$(printf '%s\n' "$COMMENTS_JSON" | jq '
              [.[] | select(.body | test("workflow_id:\\s*sfl-implement"))] | length')

            MAX_CYCLES=$(gh api "repos/${{ github.repository }}/contents/.sfl/sfl-config.yml" \
              --jq '.content' 2>/dev/null \
              | base64 -d 2>/dev/null \
              | grep -oP '^max-fix-cycles:\s*\K\d+' || echo "3")

            echo "Cycle ${CYCLE}/${MAX_CYCLES}"

            if [ "$CYCLE" -lt "$MAX_CYCLES" ]; then
              echo "Dispatching follow-up implementation"
              gh workflow run sfl-implement.lock.yml \
                --repo "${{ github.repository }}" \
                -f pull-request-number="${PR_NUM}"
            else
              echo "Max cycles reached — escalating to human"
              ISSUE_NUM=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
                --json body --jq '.body' \
                | grep -oP '(?i)(?:closes|fixes|resolves)\s+#\K\d+' | head -1 || true)
              if [ -n "$ISSUE_NUM" ]; then
                gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" --add-label "agent:blocked"
              fi
            fi
          else
            echo "Route: ALL PASS — ready for human review"

            if ! echo "$LABELS" | grep -Fxq "human:ready-for-review"; then
              gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "human:ready-for-review"
            fi

            # Undraft the PR to trigger Copilot code review
            echo "Undrafting PR #${PR_NUM} to trigger Copilot code review"
            gh pr ready "$PR_NUM" --repo "${{ github.repository }}" || {
              IS_STILL_DRAFT=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft' 2>/dev/null)
              if [ "$IS_STILL_DRAFT" = "true" ]; then
                echo "Error: failed to undraft PR #${PR_NUM}" >&2
                exit 1
              fi
              echo "PR #${PR_NUM} already ready"
            }
          fi

  # ─────────────────────────────────────────────────────────────────
  # Copilot Review Gate: react to Copilot code review comments
  # ─────────────────────────────────────────────────────────────────
  copilot-review-gate:
    if: github.event_name == 'pull_request_review'
    concurrency:
      group: sfl-copilot-review-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Handle Copilot review
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Validate event context
          if [ -z "${REVIEWER:-}" ] || [ -z "${PR_NUM:-}" ] || [ -z "${REVIEW_STATE:-}" ]; then
            echo "Missing event context: REVIEWER=${REVIEWER:-<null>} PR_NUM=${PR_NUM:-<null>} STATE=${REVIEW_STATE:-<null>}"
            exit 1
          fi

          # Only act on Copilot bot reviews (case-insensitive match)
          case "${REVIEWER,,}" in
            copilot|copilot-pull-request-reviewer|copilot\[bot\]|github-copilot\[bot\]) ;;
            *) echo "Reviewer '${REVIEWER}' is not Copilot — skipping"; exit 0 ;;
          esac

          echo "Copilot reviewed PR #${PR_NUM}: ${REVIEW_STATE}"

          # Only act on agent PRs
          LABELS=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join("\n")')

          if ! echo "$LABELS" | grep -Fxq "agent:pr"; then
            echo "Not an agent PR — skipping"
            exit 0
          fi

          # Copilot approved — no action needed, human can review
          if [ "$REVIEW_STATE" = "approved" ]; then
            echo "Copilot approved PR #${PR_NUM} — ready for human review"
            exit 0
          fi

          # changes_requested or commented — dispatch implementer to address
          if [ "$REVIEW_STATE" != "changes_requested" ] && [ "$REVIEW_STATE" != "commented" ]; then
            echo "Review state '${REVIEW_STATE}' — no action"
            exit 0
          fi

          # Enforce Copilot review cycle limit (separate from analyzer cycles)
          MAX_COPILOT_CYCLES=5
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --paginate --slurp)
          COPILOT_CYCLES=$(printf '%s\n' "$COMMENTS" | jq '[
            (add // [])[].body
            | select(contains("<!-- MARKER:sfl-copilot-dispatch"))
          ] | length')

          if [ "$COPILOT_CYCLES" -ge "$MAX_COPILOT_CYCLES" ]; then
            echo "Max Copilot review cycles (${COPILOT_CYCLES}/${MAX_COPILOT_CYCLES}) — escalating to human"

            # Mark the linked issue as agent:blocked so humans know to intervene
            ISSUE_NUM=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
              --json body --jq '.body' \
              | grep -oP '(?i)(?:closes|fixes|resolves)\s+#\K\d+' | head -1 || true)
            if [ -n "$ISSUE_NUM" ]; then
              gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" --add-label "agent:blocked"
            fi

            exit 0
          fi

          NEXT_CYCLE=$((COPILOT_CYCLES + 1))

          # Post dispatch marker
          gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --field body="<!-- MARKER:sfl-copilot-dispatch cycle:${NEXT_CYCLE} -->
          Copilot review (${REVIEW_STATE}) — dispatching implementer to address feedback (cycle ${NEXT_CYCLE}/${MAX_COPILOT_CYCLES})." > /dev/null

          echo "Dispatching implementer for PR #${PR_NUM} (Copilot cycle ${NEXT_CYCLE})"
          gh workflow run sfl-implement.lock.yml \
            --repo "${{ github.repository }}" \
            -f pull-request-number="${PR_NUM}"
