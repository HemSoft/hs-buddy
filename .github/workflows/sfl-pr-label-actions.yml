name: SFL PR Label Actions

on:
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: Target PR number for label-based actions
        required: true

permissions:
  pull-requests: write
  actions: write
  discussions: write

concurrency:
  group: sfl-pr-label-actions-${{ github.event.inputs.pull-request-number || github.run_id }}
  cancel-in-progress: false

jobs:
  label-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target PR
        id: find
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.inputs.pull-request-number }}"
          if [ -z "$PR" ]; then
            echo "::error::pull-request-number input is required but was empty"
            exit 1
          fi
          echo "pr_number=${PR}" >> "$GITHUB_OUTPUT"

      - name: Check labels and decide action
        if: steps.find.outputs.pr_number != ''
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          PR_JSON=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft,labels,title)
          TITLE=$(jq -r '.title' <<<"$PR_JSON")
          LABELS=$(jq -r '[.labels[].name] | join("\n")' <<<"$PR_JSON")

          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

          if grep -Fxq "analyzer:blocked" <<<"$LABELS"; then
            echo "action=fix-cycle" >> "$GITHUB_OUTPUT"
          else
            echo "action=ready-for-review" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix cycle — remove blocked label and dispatch issue-processor
        if: steps.decide.outputs.action == 'fix-cycle'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          echo "Analyzer(s) found blocking issues on PR #${PR_NUM}. Starting fix cycle."
          gh pr edit "$PR_NUM" --repo ${{ github.repository }} --remove-label "analyzer:blocked"
          gh workflow run sfl-issue-processor.lock.yml \
            --repo ${{ github.repository }} \
            -f pull-request-number="$PR_NUM"
          echo "Dispatched issue-processor for fix cycle on PR #${PR_NUM}"

      - name: Ready for review — add label and flip draft
        if: steps.decide.outputs.action == 'ready-for-review'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.find.outputs.pr_number }}"
          IS_DRAFT=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json isDraft --jq '.isDraft')
          gh pr edit "$PR_NUM" --repo ${{ github.repository }} --add-label "human:ready-for-review"
          if [ "$IS_DRAFT" = "true" ]; then
            echo "All analyzers passed. Flipping PR #${PR_NUM} to ready-for-review."
            gh pr ready "$PR_NUM" --repo ${{ github.repository }}
          else
            echo "PR #${PR_NUM} is already ready for review."
          fi

      - name: Log decision to Discussion #95
        if: always() && steps.find.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ steps.find.outputs.pr_number }}
          ACTION: ${{ steps.decide.outputs.action }}
          PR_TITLE: ${{ steps.decide.outputs.title }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          script: |
            const prNum = process.env.PR_NUM;
            const action = process.env.ACTION;
            const title = process.env.PR_TITLE;

            let body;
            if (action === 'fix-cycle') {
              body = `🔄 **Label Actions → Fix Cycle** | PR #${prNum} (*${title}*) — \`analyzer:blocked\` detected, dispatched issue-processor for fix cycle`;
            } else if (action === 'ready-for-review') {
              body = `✅ **Label Actions → Ready for Review** | PR #${prNum} (*${title}*) — all analyzers passed, marked ready for human review`;
            } else {
              body = `ℹ️ **Label Actions** | PR #${prNum} — no actionable state detected`;
            }

            try {
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    discussion(number: $number) { id }
                  }
                }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: 95 }
              );
              await github.graphql(
                `mutation($discussionId: ID!, $body: String!) {
                  addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                    comment { id }
                  }
                }`,
                { discussionId: repository.discussion.id, body }
              );
              console.log('Posted decision to Discussion #95');
            } catch (err) {
              core.warning(`Failed to post to Discussion #95: ${err.message}`);
            }