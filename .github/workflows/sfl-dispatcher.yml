# SFL Dispatcher — lightweight gate that prevents wasteful gh-aw runs
#
# Runs every 30 minutes and checks GitHub state with simple gh CLI calls.
# Only dispatches gh-aw workflows when there's actual work to do:
#   - Issue Processor: when agent:fixable issues exist
#   - PR Fixer: when draft PRs with agent:pr AND all 3 analyzer markers exist
#   - PR Promoter: when draft PRs are ready for promotion OR approved PRs await merge
#
# PR Analyzers A/B/C are event-driven (pull_request: opened) and not dispatched here.
#
# This eliminates no-op Copilot inference calls.

name: "SFL Dispatcher"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: write

concurrency:
  group: "sfl-dispatcher"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            sfl.json
            .github/workflows
          sparse-checkout-cone-mode: false

      - name: Model drift guard
        run: |
          set -euo pipefail

          echo "Checking model consistency between sfl.json and lock files..."
          DRIFT=false

          for KEY in $(jq -r '.models | keys[]' sfl.json); do
            EXPECTED=$(jq -r ".models[\"$KEY\"]" sfl.json)
            LOCKFILE=".github/workflows/${KEY}.lock.yml"

            if [ ! -f "$LOCKFILE" ]; then
              echo "⚠️  No lock file for $KEY — skipping"
              continue
            fi

            ACTUAL=$(grep -m1 'GH_AW_ENGINE_MODEL:' "$LOCKFILE" | sed 's/.*GH_AW_ENGINE_MODEL: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/' | tr -d '[:space:]')

            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "❌ MODEL DRIFT: $KEY — sfl.json says '$EXPECTED', lock file says '$ACTUAL'"
              DRIFT=true
            else
              echo "✅ $KEY: $EXPECTED"
            fi
          done

          if [ "$DRIFT" = "true" ]; then
            echo ""
            echo "::error::Model drift detected! Lock files do not match sfl.json. Recompile lock files before re-enabling workflows."
            exit 1
          fi

          echo ""
          echo "All models consistent."

      - name: Check for fixable issues
        id: issues
        run: |
          set -euo pipefail

          COUNT=$(gh issue list --repo "$REPO" --label "agent:fixable" --state open --json number --jq 'length')
          echo "fixable_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT fixable issue(s) — will dispatch Issue Processor."
          else
            echo "No fixable issues — skipping Issue Processor."
          fi

      - name: Check for draft PRs with agent:pr
        id: prs
        run: |
          set -euo pipefail

          # Find draft PRs with agent:pr, without agent:human-required
          PRS=$(gh pr list --repo "$REPO" --state open --draft --label "agent:pr" \
            --json number,body,labels,createdAt \
            --jq '[.[] | select(.labels | map(.name) | index("agent:human-required") | not)]')

          COUNT=$(echo "$PRS" | jq 'length')
          echo "draft_pr_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "No eligible draft PRs — skipping analyzers and fixer."
            echo "fixer_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $COUNT eligible draft PR(s) — will dispatch analyzers."

          # Check if the oldest PR has all 3 analyzer markers (fixer readiness)
          OLDEST=$(echo "$PRS" | jq -r 'sort_by(.createdAt) | .[0]')
          PR_NUMBER=$(echo "$OLDEST" | jq '.number')
          PR_BODY=$(echo "$OLDEST" | jq -r '.body // ""')
          PR_LABELS=$(echo "$OLDEST" | jq -c '[.labels[].name]')

          # Determine current cycle
          CYCLE=0
          for N in 1 2 3; do
            if echo "$PR_LABELS" | jq -e "index(\"pr:cycle-$N\")" > /dev/null 2>&1; then
              CYCLE=$N
            fi
          done

          # Check for all 3 analyzer markers at current cycle
          ALL_MARKERS=true
          for ANALYZER in a b c; do
            if ! echo "$PR_BODY" | grep -qF "[MARKER:pr-analyzer-$ANALYZER cycle:$CYCLE]"; then
              ALL_MARKERS=false
              break
            fi
          done

          # Determine state: fixer done? analyzers done? needs re-analysis?
          if echo "$PR_BODY" | grep -qF "[MARKER:pr-fixer cycle:$CYCLE]"; then
            echo "PR #$PR_NUMBER already fixed in cycle $CYCLE — fixer not needed."
            echo "fixer_ready=false" >> "$GITHUB_OUTPUT"
            echo "promoter_ready=true" >> "$GITHUB_OUTPUT"
            echo "analyzers_needed=false" >> "$GITHUB_OUTPUT"
          elif [ "$ALL_MARKERS" = "true" ]; then
            echo "PR #$PR_NUMBER has all 3 analyzer markers for cycle $CYCLE — will dispatch fixer."
            echo "fixer_ready=true" >> "$GITHUB_OUTPUT"
            echo "promoter_ready=false" >> "$GITHUB_OUTPUT"
            echo "analyzers_needed=false" >> "$GITHUB_OUTPUT"
          elif [ "$CYCLE" -gt 0 ]; then
            # Cycle > 0 with no analyzer markers — check if previous cycle was fixed
            PREV=$((CYCLE - 1))
            if echo "$PR_BODY" | grep -qF "[MARKER:pr-fixer cycle:$PREV]"; then
              echo "PR #$PR_NUMBER at cycle $CYCLE needs re-analysis (fixer completed cycle $PREV)."
              echo "fixer_ready=false" >> "$GITHUB_OUTPUT"
              echo "promoter_ready=false" >> "$GITHUB_OUTPUT"
              echo "analyzers_needed=true" >> "$GITHUB_OUTPUT"
            else
              echo "PR #$PR_NUMBER missing analyzer markers for cycle $CYCLE — fixer not ready."
              echo "fixer_ready=false" >> "$GITHUB_OUTPUT"
              echo "promoter_ready=false" >> "$GITHUB_OUTPUT"
              echo "analyzers_needed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "PR #$PR_NUMBER missing analyzer markers for cycle $CYCLE — waiting for analyzers."
            echo "fixer_ready=false" >> "$GITHUB_OUTPUT"
            echo "promoter_ready=false" >> "$GITHUB_OUTPUT"
            echo "analyzers_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Issue Processor
        if: steps.issues.outputs.fixable_count != '0'
        run: |
          echo "Dispatching Issue Processor..."
          gh workflow run issue-processor.lock.yml --repo "$REPO"

      - name: Dispatch PR Analyzers (re-analysis after fixer)
        if: steps.prs.outputs.analyzers_needed == 'true'
        run: |
          echo "Dispatching all 3 PR Analyzers for re-analysis..."
          gh workflow run pr-analyzer-a.lock.yml --repo "$REPO"
          gh workflow run pr-analyzer-b.lock.yml --repo "$REPO"
          gh workflow run pr-analyzer-c.lock.yml --repo "$REPO"

      - name: Dispatch PR Fixer
        if: steps.prs.outputs.fixer_ready == 'true'
        run: |
          echo "Dispatching PR Fixer..."
          gh workflow run pr-fixer.lock.yml --repo "$REPO"

      - name: Check for non-draft PRs awaiting promotion
        id: ready_prs
        run: |
          set -euo pipefail

          # Find non-draft PRs with human:ready-for-review
          # The Promoter itself reads sfl-config.yml to decide if approval is needed
          COUNT=$(gh pr list --repo "$REPO" --state open --label "human:ready-for-review" \
            --json number,isDraft \
            --jq '[.[] | select(.isDraft == false)] | length')

          echo "ready_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT non-draft PR(s) with human:ready-for-review — will dispatch PR Promoter."
          else
            echo "No non-draft PRs awaiting promotion."
          fi

      - name: Check for draft PRs with ready-for-review label
        id: label_actions
        run: |
          set -euo pipefail
          COUNT=$(gh pr list --repo "$REPO" --state open --draft --label "human:ready-for-review" --json number --jq 'length')
          echo "label_flip_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT draft PR(s) with human:ready-for-review — will dispatch PR Label Actions."
          else
            echo "No draft PRs with ready-for-review label — skipping PR Label Actions."
          fi

      - name: Dispatch PR Label Actions
        if: steps.label_actions.outputs.label_flip_count != '0'
        run: |
          echo "Dispatching PR Label Actions..."
          gh workflow run pr-label-actions.yml --repo "$REPO"

      - name: Dispatch PR Promoter
        if: steps.prs.outputs.promoter_ready == 'true' || steps.ready_prs.outputs.ready_count != '0'
        run: |
          echo "Dispatching PR Promoter..."
          gh workflow run pr-promoter.lock.yml --repo "$REPO"

      - name: Summary
        run: |
          echo "## SFL Dispatcher Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow | Dispatched |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------------|" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.issues.outputs.fixable_count }}" != "0" ]; then
            echo "| Issue Processor | Yes (${{ steps.issues.outputs.fixable_count }} fixable issues) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Issue Processor | No (0 fixable issues) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.prs.outputs.analyzers_needed }}" = "true" ]; then
            echo "| PR Analyzers A/B/C | Yes (re-analysis after fixer) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| PR Analyzers A/B/C | No (not needed) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.prs.outputs.fixer_ready }}" = "true" ]; then
            echo "| PR Fixer | Yes (markers complete) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| PR Fixer | No (markers incomplete) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          PROMOTER_DISPATCHED="No"
          PROMOTER_REASON=""
          if [ "${{ steps.prs.outputs.promoter_ready }}" = "true" ]; then
            PROMOTER_DISPATCHED="Yes"
            PROMOTER_REASON="fixer complete, ready for promotion"
          fi
          if [ "${{ steps.ready_prs.outputs.ready_count }}" != "0" ]; then
            PROMOTER_DISPATCHED="Yes"
            if [ -n "$PROMOTER_REASON" ]; then
              PROMOTER_REASON="$PROMOTER_REASON + ${{ steps.ready_prs.outputs.ready_count }} ready-for-review PRs"
            else
              PROMOTER_REASON="${{ steps.ready_prs.outputs.ready_count }} ready-for-review PRs"
            fi
          fi
          if [ "${{ steps.label_actions.outputs.label_flip_count }}" != "0" ]; then
            echo "| PR Label Actions | Yes (${{ steps.label_actions.outputs.label_flip_count }} draft PRs to flip) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| PR Label Actions | No (no draft PRs with ready-for-review label) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$PROMOTER_DISPATCHED" = "Yes" ]; then
            echo "| PR Promoter | Yes ($PROMOTER_REASON) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| PR Promoter | No (no draft or approved PRs) |" >> "$GITHUB_STEP_SUMMARY"
          fi
