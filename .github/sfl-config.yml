# SFL Autonomy Configuration
# Controls how much the Set it Free Loop can do without human intervention.
# This file is HUMAN-ONLY — SFL workflows must never modify it.

autonomy:
  auto-merge: false           # Must remain false: humans own all final merges
  auto-create-pr: true        # Can dispatcher/processor create PRs from issues?
  conflict-resolution: true   # Can PR Fixer resolve merge conflicts automatically?

cycles:
  max-fix-cycles: 15          # Max analyzer→fix cycles before human escalation

activity-log:
  discussion: 95              # Discussion number for the SFL Activity Log
  format: "YYYY-MM-DD h:mm AM/PM EST | Workflow Name | Target | ✅/❌ Summary"
