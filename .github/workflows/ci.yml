name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Bun
        run: npm install -g bun@1.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for unused code and dependencies
        run: bun run knip

      - name: Lint (ESLint)
        run: bun run lint

      - name: Type check (TypeScript)
        run: bun run typecheck

      - name: Format check (Prettier)
        run: bun run format:check

      - name: Analyze dependency health
        run: npx --yes @e18e/cli analyze
        continue-on-error: true

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Report coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Category | Covered |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const data = require('./coverage/coverage-summary.json');
              const t = data.total;
              ['statements','branches','functions','lines'].forEach(k => {
                const pct = t[k].pct.toFixed(1);
                const line = '| ' + k.charAt(0).toUpperCase() + k.slice(1) + ' | ' + pct + '% |';
                require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, line + '\n');
              });
            "
          fi

      - name: Upload Cobertura and lcov coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cobertura-coverage
          path: coverage/
          retention-days: 30

      - name: Security audit (non-blocking, scorecard visibility only)
        run: |
          npm i --package-lock-only --ignore-scripts --silent 2>/dev/null
          npm audit --audit-level=critical
          rm -f package-lock.json
        continue-on-error: true

      - name: Build (vite + electron)
        run: npx tsc && npx vite build

      - name: Check bundle sizes
        run: bun run bundle-size

      - name: Run benchmarks
        run: bun run bench
        continue-on-error: true
