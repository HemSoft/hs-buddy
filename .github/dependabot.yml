updates:
- commit-message:
    prefix: "chore(deps):"
  directory: /
  labels:
  - dependencies
  open-pull-requests-limit: 5
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
- commit-message:
    prefix: "ci(deps):"
  directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
version: 2
