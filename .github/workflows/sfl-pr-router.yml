name: SFL PR Router

on:
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: Target draft PR number for deterministic routing
        required: false

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: sfl-pr-router-${{ github.event.inputs.pull-request-number || github.run_id }}
  cancel-in-progress: false

jobs:
  route:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      EVENT_NAME: ${{ github.event_name }}
      INPUT_PR_NUMBER: ${{ github.event.inputs.pull-request-number }}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Route PR deterministically
        shell: bash
        run: |
          set -euo pipefail
          export LANG="${LANG:-C.UTF-8}"
          export LC_ALL="${LC_ALL:-C.UTF-8}"

          if [[ -n "${INPUT_PR_NUMBER:-}" ]]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            PR_NUMBER=$(gh pr list --repo "$REPO" --state open --draft --label "agent:pr" --json number,updatedAt --jq 'sort_by(.updatedAt) | reverse | .[0].number // empty')
          fi

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "No eligible PR found for routing."
            exit 0
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json number,isDraft,body,labels)
          BODY=$(jq -r '.body // ""' <<<"$PR_JSON")
          export BODY
          IS_DRAFT=$(jq -r '.isDraft' <<<"$PR_JSON")
          LABELS=$(jq -r '[.labels[].name] | join("\n")' <<<"$PR_JSON")

          if [[ "$IS_DRAFT" != "true" ]]; then
            echo "PR #$PR_NUMBER is already ready for review."
            exit 0
          fi

          if ! grep -Fxq "agent:pr" <<<"$LABELS"; then
            echo "PR #$PR_NUMBER is not an agent PR."
            exit 0
          fi

          if grep -Fxq "agent:human-required" <<<"$LABELS"; then
            echo "PR #$PR_NUMBER requires human intervention."
            exit 0
          fi

          CYCLE=$( (grep -Eo 'pr:cycle-[0-9]+' <<<"$LABELS" || true) | sed 's/pr:cycle-//' | sort -n | tail -1 )
          CYCLE=${CYCLE:-0}

          ROUTER_MARKER="[MARKER:sfl-pr-router cycle:$CYCLE]"
          if grep -Fq "$ROUTER_MARKER" <<<"$BODY"; then
            echo "PR #$PR_NUMBER cycle $CYCLE already routed."
            exit 0
          fi

          MARKER_A="[MARKER:sfl-analyzer-a cycle:$CYCLE]"
          MARKER_B="[MARKER:sfl-analyzer-b cycle:$CYCLE]"
          MARKER_C="[MARKER:sfl-analyzer-c cycle:$CYCLE]"

          HAS_A=false
          HAS_B=false
          HAS_C=false

          if grep -Fq "$MARKER_A" <<<"$BODY"; then
            HAS_A=true
          fi
          if grep -Fq "$MARKER_B" <<<"$BODY"; then
            HAS_B=true
          fi
          if grep -Fq "$MARKER_C" <<<"$BODY"; then
            HAS_C=true
          fi

          if [[ "$HAS_A" != "true" ]]; then
            echo "PR #$PR_NUMBER cycle $CYCLE is not ready for routing yet."
            exit 0
          fi

          if [[ "$HAS_B" != "true" ]]; then
            gh workflow run "sfl-analyzer-b.lock.yml" --repo "$REPO" -f pull-request-number="$PR_NUMBER"
            echo "Dispatched Analyzer B for PR #$PR_NUMBER via deterministic router."
            exit 0
          fi

          if [[ "$HAS_C" != "true" ]]; then
            gh workflow run "sfl-analyzer-c.lock.yml" --repo "$REPO" -f pull-request-number="$PR_NUMBER"
            echo "Dispatched Analyzer C for PR #$PR_NUMBER via deterministic router."
            exit 0
          fi

          extract_verdict() {
            local marker="$1"
            awk -v marker="$marker" '
              index($0, marker) { in_block = 1; next }
              in_block && /^### Verdict$/ {
                while (getline) {
                  if ($0 !~ /^$/) {
                    print
                    exit
                  }
                }
              }
            ' <<<"$BODY"
          }

          VERDICT_A=$(extract_verdict "$MARKER_A")
          VERDICT_B=$(extract_verdict "$MARKER_B")
          VERDICT_C=$(extract_verdict "$MARKER_C")

          if [[ -z "$VERDICT_A" || -z "$VERDICT_B" || -z "$VERDICT_C" ]]; then
            echo "PR #$PR_NUMBER cycle $CYCLE is missing one or more analyzer verdict lines."
            exit 0
          fi

          if [[ "$VERDICT_A" == "**PASS** |"* && "$VERDICT_B" == "**PASS** |"* && "$VERDICT_C" == "**PASS** |"* ]]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "human:ready-for-review"
            gh workflow run "sfl-pr-label-actions.yml" --repo "$REPO" -f pull-request-number="$PR_NUMBER"

            {
              printf '%s' "$BODY"
              printf '\n\n%s\n\n' "$ROUTER_MARKER"
              printf '%s\n\n' '## :white_check_mark: SFL PR Router &mdash; Ready for Human Review'
              printf '%s\n' '**Router**: SFL PR Router'
              printf '%s\n' "**Cycle**: $CYCLE"
              printf '%s\n\n' "**PR**: #$PR_NUMBER"
              printf '%s\n\n' '### Decision'
              printf '%s\n' 'All three analyzers returned **PASS** for the current cycle. Added `human:ready-for-review` to hand off to label-actions and human review.'
            } > pr-body.md
            gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file pr-body.md
            echo "Promoted PR #$PR_NUMBER via deterministic router and dispatched label-actions once."
            exit 0
          fi

          if [[ "$VERDICT_A" == *"BLOCKING ISSUES FOUND"* || "$VERDICT_B" == *"BLOCKING ISSUES FOUND"* || "$VERDICT_C" == *"BLOCKING ISSUES FOUND"* ]]; then
            {
              printf '%s' "$BODY"
              printf '\n\n%s\n\n' "$ROUTER_MARKER"
              printf '%s\n\n' '## :repeat: SFL PR Router &mdash; Returned for Implementation'
              printf '%s\n' '**Router**: SFL PR Router'
              printf '%s\n' "**Cycle**: $CYCLE"
              printf '%s\n\n' "**PR**: #$PR_NUMBER"
              printf '%s\n\n' '### Decision'
              printf '%s\n' 'At least one analyzer reported **BLOCKING ISSUES FOUND** for the current cycle. Dispatching Issue Processor for the next implementation pass.'
            } > pr-body.md
            gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file pr-body.md
            gh workflow run "sfl-issue-processor.lock.yml" --repo "$REPO" -f pull-request-number="$PR_NUMBER"
            echo "Dispatched Issue Processor for PR #$PR_NUMBER via deterministic router."
            exit 0
          fi

          echo "PR #$PR_NUMBER cycle $CYCLE does not have a routable verdict state."
          exit 1
