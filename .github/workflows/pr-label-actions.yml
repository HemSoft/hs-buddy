name: SFL PR Label Actions

on:
  pull_request:
    types: [labeled]
  workflow_dispatch: # Dispatched by SFL Dispatcher when a draft PR is human-ready

permissions:
  pull-requests: write

jobs:
  ready-for-review:
    if: >-
      (github.event_name == 'pull_request'
      && github.event.label.name == 'human:ready-for-review'
      && github.event.pull_request.draft == true)
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Find draft PRs with ready-for-review label
        if: github.event_name != 'pull_request'
        id: find
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo ${{ github.repository }} --state open --draft --label "human:ready-for-review" --json number --jq '.[0].number // empty')
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
      - name: Mark PR as ready for review
        if: >-
          (github.event_name == 'pull_request')
          || (github.event_name != 'pull_request' && steps.find.outputs.pr_number != '')
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          else
            PR_NUM="${{ steps.find.outputs.pr_number }}"
          fi
          echo "Flipping PR #${PR_NUM} from draft to ready-for-review"
          gh pr ready "${PR_NUM}" --repo ${{ github.repository }}
          echo "Done — PR is now ready for review"
