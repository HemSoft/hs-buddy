name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.12.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine comparison baseline
        id: baseline
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            baseline_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            baseline_ref="${{ github.event.before }}"
          else
            baseline_ref="$(git rev-parse HEAD^)"
          fi
          echo "ref=${baseline_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout comparison baseline
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ steps.baseline.outputs.ref }}"
          git worktree add --detach "$RUNNER_TEMP/bench-baseline" FETCH_HEAD

      - name: Determine benchmark gate mode
        id: gate
        shell: bash
        run: |
          changed_files="$(git diff --name-only FETCH_HEAD HEAD)"
          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(package\.json|bun\.lock|\.github/workflows/benchmarks\.yml|scripts/bench-.*\.ts)$'; then
            echo "advisory=true" >> "$GITHUB_OUTPUT"
            echo "Benchmark harness or toolchain changed; comparison failures will be advisory."
          else
            echo "advisory=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run baseline benchmarks on this runner
        id: baseline_benchmarks
        shell: bash
        env:
          BENCHMARK_COMPARISON_ADVISORY: ${{ steps.gate.outputs.advisory }}
        run: |
          cd "$RUNNER_TEMP/bench-baseline"
          if ! bun install --frozen-lockfile; then
            if [[ "$BENCHMARK_COMPARISON_ADVISORY" == "true" ]]; then
              echo "::warning::Baseline dependency install failed, but this run is advisory because the benchmark harness or toolchain changed."
              echo "skip_compare=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit 1
          fi
          echo "skip_compare=false" >> "$GITHUB_OUTPUT"
          for run in 1 2 3 4 5; do
            echo "Baseline benchmark run ${run}/5"
            bunx vitest bench --outputJson "$GITHUB_WORKSPACE/bench-baseline-run-${run}.json"
          done

      - name: Run benchmarks on this runner
        if: steps.baseline_benchmarks.outputs.skip_compare != 'true'
        shell: bash
        run: |
          for run in 1 2 3 4 5; do
            echo "Candidate benchmark run ${run}/5"
            bunx vitest bench --outputJson "bench-results-run-${run}.json"
          done

      - name: Build median benchmark outputs
        if: steps.baseline_benchmarks.outputs.skip_compare != 'true'
        shell: bash
        run: |
          bun scripts/bench-median.ts --output bench-baseline.json \
            bench-baseline-run-1.json \
            bench-baseline-run-2.json \
            bench-baseline-run-3.json \
            bench-baseline-run-4.json \
            bench-baseline-run-5.json
          bun scripts/bench-median.ts --output bench-results.json \
            bench-results-run-1.json \
            bench-results-run-2.json \
            bench-results-run-3.json \
            bench-results-run-4.json \
            bench-results-run-5.json

      - name: Compare against baseline
        if: steps.baseline_benchmarks.outputs.skip_compare != 'true'
        shell: bash
        env:
          BENCHMARK_COMPARISON_ADVISORY: ${{ steps.gate.outputs.advisory }}
        run: |
          if bun run bench:compare; then
            exit 0
          fi
          if [[ "$BENCHMARK_COMPARISON_ADVISORY" == "true" ]]; then
            echo "::warning::Benchmark comparison failed, but this run is advisory because the benchmark harness or toolchain changed."
            exit 0
          fi
          exit 1

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-results
          path: |
            bench-baseline.json
            bench-results.json
            bench-baseline-run-*.json
            bench-results-run-*.json
          if-no-files-found: warn
          retention-days: 30
